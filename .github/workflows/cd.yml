name: CD - Deploy Bridge Tecnologia

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Ambiente de deploy'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --if-present

      - name: Build project
        run: npm run build --if-present
        env:
          NODE_ENV: production

      - name: Deploy to Vercel
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./

      - name: Comment deployment URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Deploy realizado com sucesso!**\n\n🔗 URL: ${{ steps.deploy.outputs.url }}`
            })

  notify-slack:
    name: Notify on Deploy
    runs-on: ubuntu-latest
    needs: deploy-vercel
    if: always()
    steps:
      - name: Notify success
        if: needs.deploy-vercel.result == 'success'
        run: |
          echo "Deploy realizado com sucesso em $(date)"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"

      - name: Notify failure
        if: needs.deploy-vercel.result == 'failure'
        run: |
          echo "FALHA no deploy em $(date)"
          echo "Commit: ${{ github.sha }}"
          exit 1
